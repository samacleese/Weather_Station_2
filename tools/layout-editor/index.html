<!DOCTYPE html>
<!-- ABOUTME: Graphical layout editor for Weather Station display elements. -->
<!-- ABOUTME: Load layout.json, drag elements, export updated layout.json. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Station Layout Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 13px; background: #1e1e1e; color: #ccc; height: 100vh; display: flex; flex-direction: column; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: #2d2d2d; border-bottom: 1px solid #444;
    flex-shrink: 0;
  }
  #toolbar h1 { font-size: 14px; font-weight: 600; color: #eee; margin-right: 8px; }
  .screen-btn {
    padding: 4px 14px; border-radius: 4px; border: 1px solid #555; cursor: pointer;
    background: #3a3a3a; color: #bbb; font-size: 12px;
  }
  .screen-btn.active { background: #4a9eff; border-color: #4a9eff; color: #fff; }
  .spacer { flex: 1; }
  .toolbar-btn {
    padding: 5px 14px; border-radius: 4px; border: 1px solid #555; cursor: pointer;
    background: #3a3a3a; color: #ccc; font-size: 12px;
  }
  .toolbar-btn:hover { background: #4a4a4a; }

  /* ── Main layout ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left panel ── */
  #left-panel {
    width: 180px; flex-shrink: 0; background: #252525; border-right: 1px solid #444;
    overflow-y: auto; padding: 8px 0;
  }
  #left-panel h2 { font-size: 11px; text-transform: uppercase; color: #666; padding: 4px 12px 6px; letter-spacing: 0.8px; }
  .el-item {
    padding: 7px 12px; cursor: pointer; color: #bbb; border-left: 3px solid transparent;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .el-item:hover { background: #2e2e2e; }
  .el-item.selected { background: #2a3a52; border-left-color: #4a9eff; color: #fff; }
  .el-coords { font-size: 10px; color: #666; }

  /* ── Canvas area ── */
  #canvas-area {
    flex: 1; overflow: auto; background: #181818;
    display: flex; align-items: flex-start; justify-content: flex-start; padding: 16px;
  }
  #canvas-wrap { position: relative; flex-shrink: 0; }
  #screen-canvas { display: block; background: #fff; }

  /* ── Right panel ── */
  #right-panel {
    width: 200px; flex-shrink: 0; background: #252525; border-left: 1px solid #444;
    padding: 12px; overflow-y: auto;
  }
  #right-panel h2 { font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: 10px; letter-spacing: 0.8px; }
  .prop-row { margin-bottom: 10px; }
  .prop-row label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
  .prop-row input[type=number], .prop-row select {
    width: 100%; padding: 4px 7px; border-radius: 4px;
    border: 1px solid #444; background: #1e1e1e; color: #ccc; font-size: 12px;
  }
  .prop-row input[type=number]:focus, .prop-row select:focus {
    outline: none; border-color: #4a9eff;
  }
  .prop-row.disabled label { color: #555; }
  .prop-row.disabled input { color: #555; background: #1a1a1a; width: 100%; padding: 4px 7px;
    border-radius: 4px; border: 1px solid #333; font-size: 12px; }
  #no-selection { color: #555; font-size: 12px; margin-top: 8px; }
  #placement-hint { font-size: 11px; color: #5a8a5a; margin-top: 10px; line-height: 1.4; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>Layout Editor</h1>
  <button class="screen-btn active" data-screen="main">Main</button>
  <button class="screen-btn" data-screen="loading">Loading</button>
  <div class="spacer"></div>
  <button class="toolbar-btn" id="load-btn">Load JSON</button>
  <button class="toolbar-btn" id="export-btn">Export JSON</button>
  <input type="file" id="file-input" accept=".json" style="display:none">
</div>

<div id="main">
  <div id="left-panel">
    <h2>Elements</h2>
    <div id="el-list"></div>
  </div>

  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="screen-canvas"></canvas>
    </div>
  </div>

  <div id="right-panel">
    <h2>Properties</h2>
    <div id="props-content">
      <div id="no-selection">Select an element</div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

const DISPLAY_W = 1200;
const DISPLAY_H = 825;
const SCALE = 0.6;

const VALID_FONT_SIZES = [12, 14, 17, 20, 24, 29, 35, 42, 50, 60, 72, 87, 104, 125, 150];

// Representative text rendered on canvas so font size is visually meaningful
const SAMPLE_TEXT = {
  temperature:  '-3 C',
  wind_speed:   '14 km/h',
  description:  'Partly Cloudy',
  metar:        'KBFI 241553Z 35005KT 10SM FEW040 12/03 A3012',
  battery_info: '3.85V 22C',
  warnings:     'Warning: timeout',
  message:      'Weather Station Loading...',
};

// Whether element uses bold or light weight (fixed in firmware)
const IS_BOLD = {
  main: {
    temperature: true,
    wind_speed:  true,
    metar:       true,
    description: false,
    battery_info:false,
    warnings:    false,
    kitty:       false,
  },
  loading: {
    message: true,
  },
};

const FONT_WEIGHT_LABEL = {
  main: {
    temperature: 'Roboto_Medium',
    wind_speed:  'Roboto_Medium',
    metar:       'Roboto_Medium',
    description: 'Roboto_Light',
    battery_info:'Roboto_Light',
    warnings:    'Roboto_Light',
    kitty:       null,
  },
  loading: {
    message: 'Roboto_Medium',
  },
};

// Default layout — matches layout.json initial values
const DEFAULT_LAYOUT = {
  display: { width: 1200, height: 825 },
  screens: {
    main: {
      temperature:  { x: 50,  y: 150, font_size: 150 },
      wind_speed:   { x: 50,  y: 325, font_size: 150 },
      description:  { x: 50,  y: 620, font_size: 150 },
      metar:        { x: 20,  y: 750, font_size: 20  },
      kitty:        { x: 850, y: 50  },
      battery_info: { x: 860, y: 400, font_size: 42  },
      warnings:     { x: 860, y: 490, font_size: 24  },
    },
    loading: {
      message: { x: 300, y: 350, font_size: 35 },
    },
  },
};

// Kitty preview dimensions (matches Kitties::w, Kitties::h)
const KITTY_W = 300;
const KITTY_H = 300;

// ── State ──────────────────────────────────────────────────────────────────

let layout = JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
let activeScreen = 'main';
let selectedElement = null; // { screen, name } | null

// ── Canvas ─────────────────────────────────────────────────────────────────

const canvas = document.getElementById('screen-canvas');
const ctx = canvas.getContext('2d');
canvas.width  = Math.round(DISPLAY_W * SCALE);
canvas.height = Math.round(DISPLAY_H * SCALE);

function canvasFont(screen, name, fontSize) {
  const bold = IS_BOLD[screen]?.[name];
  const weight = bold ? 'bold' : '300';
  return `${weight} ${fontSize * SCALE}px "Roboto", sans-serif`;
}

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // White e-paper background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = '#ebebeb';
  ctx.lineWidth = 0.5;
  const step = 50 * SCALE;
  for (let x = 0; x <= canvas.width; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Display border
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, canvas.width, canvas.height);

  const screen = layout.screens[activeScreen];
  if (!screen) return;

  ctx.textBaseline = 'alphabetic';

  for (const [name, props] of Object.entries(screen)) {
    const sx = props.x * SCALE;
    const sy = props.y * SCALE;
    const isSel = selectedElement?.screen === activeScreen && selectedElement?.name === name;

    if (name === 'kitty') {
      // Gray placeholder rectangle
      ctx.fillStyle = '#d8d8d8';
      ctx.fillRect(sx, sy, KITTY_W * SCALE, KITTY_H * SCALE);

      // Diagonal cross to indicate placeholder
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + KITTY_W * SCALE, sy + KITTY_H * SCALE);
      ctx.moveTo(sx + KITTY_W * SCALE, sy);
      ctx.lineTo(sx, sy + KITTY_H * SCALE);
      ctx.stroke();

      ctx.fillStyle = '#999';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('kitty  ' + KITTY_W + '×' + KITTY_H, sx + KITTY_W * SCALE / 2, sy + KITTY_H * SCALE / 2);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';

      if (isSel) {
        ctx.strokeStyle = '#e08000';
        ctx.lineWidth = 2.5;
        ctx.strokeRect(sx - 2, sy - 2, KITTY_W * SCALE + 4, KITTY_H * SCALE + 4);
      }
    } else {
      const text = SAMPLE_TEXT[name] || name;
      const fontSize = (props.font_size || 14) * SCALE;
      ctx.font = canvasFont(activeScreen, name, props.font_size || 14);

      // Selection highlight behind text
      if (isSel) {
        const m = ctx.measureText(text);
        const ascent  = m.actualBoundingBoxAscent  || fontSize * 0.8;
        const descent = m.actualBoundingBoxDescent || fontSize * 0.2;
        ctx.fillStyle = 'rgba(255, 200, 0, 0.18)';
        ctx.fillRect(sx - 3, sy - ascent - 3, m.width + 6, ascent + descent + 6);
        ctx.strokeStyle = '#e08000';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 3]);
        ctx.strokeRect(sx - 3, sy - ascent - 3, m.width + 6, ascent + descent + 6);
        ctx.setLineDash([]);
      }

      ctx.fillStyle = '#111';
      ctx.fillText(text, sx, sy);
    }

    // Small origin dot marking the cursor position
    ctx.fillStyle = isSel ? '#e08000' : 'rgba(74, 158, 255, 0.7)';
    ctx.beginPath();
    ctx.arc(sx, sy, isSel ? 4 : 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Crosshair cursor hint when element is selected
  if (selectedElement && selectedElement.screen === activeScreen) {
    canvas.style.cursor = 'crosshair';
  } else {
    canvas.style.cursor = 'default';
  }
}

// ── Element list ───────────────────────────────────────────────────────────

const elList = document.getElementById('el-list');

function renderList() {
  elList.innerHTML = '';
  const screen = layout.screens[activeScreen];
  if (!screen) return;

  for (const [name, props] of Object.entries(screen)) {
    const isSel = selectedElement?.screen === activeScreen && selectedElement?.name === name;
    const item = document.createElement('div');
    item.className = 'el-item' + (isSel ? ' selected' : '');

    const coords = `(${props.x}, ${props.y})` + (props.font_size != null ? ` sz:${props.font_size}` : '');
    item.innerHTML = `<div>${name}</div><div class="el-coords">${coords}</div>`;
    item.addEventListener('click', () => selectElement(activeScreen, name));
    elList.appendChild(item);
  }
}

// ── Properties panel ───────────────────────────────────────────────────────

const propsContent = document.getElementById('props-content');

function renderProps() {
  propsContent.innerHTML = '';

  if (!selectedElement) {
    propsContent.innerHTML = '<div id="no-selection">Select an element</div>';
    return;
  }

  const { screen, name } = selectedElement;
  const props = layout.screens[screen][name];
  if (!props) return;

  const hasFont = props.font_size != null;
  const fontWeightLabel = FONT_WEIGHT_LABEL[screen]?.[name];

  function numRow(labelText, key, val, max) {
    const row = document.createElement('div');
    row.className = 'prop-row';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.value = val;
    inp.min = 0;
    inp.max = max;
    inp.addEventListener('input', () => {
      const v = parseInt(inp.value, 10);
      if (!isNaN(v)) {
        props[key] = v;
        renderList();
        drawCanvas();
      }
    });
    row.appendChild(lbl);
    row.appendChild(inp);
    return row;
  }

  propsContent.appendChild(numRow('X', 'x', props.x, DISPLAY_W));
  propsContent.appendChild(numRow('Y', 'y', props.y, DISPLAY_H));

  if (hasFont) {
    const row = document.createElement('div');
    row.className = 'prop-row';
    const lbl = document.createElement('label');
    lbl.textContent = 'Font Size';
    const sel = document.createElement('select');
    for (const sz of VALID_FONT_SIZES) {
      const opt = document.createElement('option');
      opt.value = sz;
      opt.textContent = sz;
      if (sz === props.font_size) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener('change', () => {
      props.font_size = parseInt(sel.value, 10);
      renderList();
      drawCanvas();
    });
    row.appendChild(lbl);
    row.appendChild(sel);
    propsContent.appendChild(row);
  }

  if (fontWeightLabel) {
    const row = document.createElement('div');
    row.className = 'prop-row disabled';
    const lbl = document.createElement('label');
    lbl.textContent = 'Font Weight';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = fontWeightLabel;
    inp.disabled = true;
    row.appendChild(lbl);
    row.appendChild(inp);
    propsContent.appendChild(row);
  }

  const hint = document.createElement('div');
  hint.id = 'placement-hint';
  hint.textContent = 'Click canvas to place';
  propsContent.appendChild(hint);
}

// ── Selection ──────────────────────────────────────────────────────────────

function selectElement(screen, name) {
  selectedElement = { screen, name };
  renderList();
  drawCanvas();
  renderProps();
}

// ── Canvas click-to-place ──────────────────────────────────────────────────

canvas.addEventListener('click', (e) => {
  if (!selectedElement) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((e.clientX - rect.left) / SCALE);
  const y = Math.round((e.clientY - rect.top)  / SCALE);

  const { screen, name } = selectedElement;
  layout.screens[screen][name].x = x;
  layout.screens[screen][name].y = y;

  renderList();
  drawCanvas();
  renderProps();
});

// ── Screen toggle ──────────────────────────────────────────────────────────

document.querySelectorAll('.screen-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeScreen = btn.dataset.screen;
    selectedElement = null;
    renderList();
    drawCanvas();
    renderProps();
  });
});

// ── Load JSON ──────────────────────────────────────────────────────────────

document.getElementById('load-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      layout = JSON.parse(ev.target.result);
      selectedElement = null;
      renderList();
      drawCanvas();
      renderProps();
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Export JSON ────────────────────────────────────────────────────────────

document.getElementById('export-btn').addEventListener('click', () => {
  const json = JSON.stringify(layout, null, 2) + '\n';
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'layout.json';
  a.click();
  URL.revokeObjectURL(url);
});

// ── Initial render ─────────────────────────────────────────────────────────

drawCanvas();
renderList();
renderProps();
</script>
</body>
</html>
